name: Copiscope
options:
  bundleIdPrefix: com.copiscope
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  swift-collections:
    url: https://github.com/apple/swift-collections.git
    from: "1.1.0"

targets:
  Copiscope:
    type: application
    platform: macOS
    sources:
      - path: Copiscope
        excludes:
          - Info.plist
      - path: CHANGELOG.md
        type: file
        buildPhase: resources
    info:
      path: Copiscope/Info.plist
      properties:
        LSUIElement: true
        CFBundleIconFile: AppIcon
        CFBundleName: Copiscope
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
    dependencies:
      - package: swift-collections
        product: OrderedCollections
    entitlements:
      path: Copiscope/Copiscope.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.files.user-selected.read-only: true
    settings:
      base:
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.copiscope.app
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Developer ID Application"
        DEVELOPMENT_TEAM: "DN8M2CQ4D2"
        PRODUCT_NAME: Copiscope
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: Copiscope/Info.plist
        CODE_SIGN_ENTITLEMENTS: Copiscope/Copiscope.entitlements
        ENABLE_HARDENED_RUNTIME: true
        OTHER_CODE_SIGN_FLAGS: "--timestamp"
        OTHER_LDFLAGS: "-lsqlite3"
      configs:
        Release:
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: false

  CopIscopeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: CopIscopeTests
    dependencies:
      - target: Copiscope
    settings:
      base:
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: true
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: false

schemes:
  Copiscope:
    build:
      targets:
        Copiscope: all
        CopIscopeTests: [test]
    test:
      targets:
        - CopIscopeTests
